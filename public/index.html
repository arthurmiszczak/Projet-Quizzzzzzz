<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' type='text/css' href='main.css'>
    <title>Projet-Quizzzzzzz</title>
    <style>
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            padding: 40px 30px;
        }
        .quiz-card {
            background: white;
            border: 1px solid #e8eaed;
            border-radius: 10px;
            padding: 24px 16px;
            text-align: center;
            text-decoration: none;
            color: #1a1a1a;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .quiz-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 2px 12px rgba(59,130,246,0.15);
            transform: translateY(-2px);
        }
        .quiz-card .quiz-number {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .quiz-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .quiz-card p {
            font-size: 12px;
            color: #5f6368;
        }
        .welcome-header {
            padding: 32px 30px 0;
            text-align: center;
        }
        .welcome-header h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .welcome-header p {
            font-size: 14px;
            color: #5f6368;
        }
        .result-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-home {
            background: #5f6368;
            text-decoration: none;
            display: inline-block;
        }
        .btn-next {
            background: #10b981;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- Modal de connexion/inscription -->
    <div id="authModal" class="auth-modal">
        <div class="auth-modal-content">
            <h2>Bienvenue!</h2>
            <p>Connectez-vous ou créez un compte pour commencer</p>
            
            <div class="auth-tabs">
                <button class="auth-tab-btn active" data-tab="login">Inscription</button>
                <button class="auth-tab-btn" data-tab="signup">Connexion</button>
            </div>

            <form id="signupForm" class="auth-form">
                <input type="email" id="login" placeholder="Email" required>
                <input type="password" id="password" placeholder="Mot de passe" required>
                <button type="submit" id="monBouton" class="auth-btn">Se connecter</button>
            </form>

            <form id="loginForm" class="auth-form active">
                <input type="email" id="login2" placeholder="Email" required>
                <input type="password" id="password2" placeholder="Mot de passe" required>
                <button type="submit" id="monBouton2" class="auth-btn">S'inscrire</button>
            </form>
        </div>
    </div>

    <div class="quiz-container">
        <div class="quiz-header">
            <h1>Projet-Quizzzzzzz</h1>
        </div>

        <div class="welcome-header">
            <h2>Choisissez un quiz</h2>
            <p>5 thèmes, 5 questions chacun — bonne chance !</p>
        </div>

        <div class="quiz-grid">
            <a href="quiz1.html" class="quiz-card">
                <div class="quiz-number">🌍</div>
                <h3>Quiz 1</h3>
                <p>Géographie & Histoire</p>
            </a>
            <a href="quiz2.html" class="quiz-card">
                <div class="quiz-number">🔬</div>
                <h3>Quiz 2</h3>
                <p>Sciences</p>
            </a>
            <a href="quiz3.html" class="quiz-card">
                <div class="quiz-number">⚽</div>
                <h3>Quiz 3</h3>
                <p>Sport</p>
            </a>
            <a href="quiz4.html" class="quiz-card">
                <div class="quiz-number">🎬</div>
                <h3>Quiz 4</h3>
                <p>Cinéma & Culture Pop</p>
            </a>
            <a href="quiz5.html" class="quiz-card">
                <div class="quiz-number">🍕</div>
                <h3>Quiz 5</h3>
                <p>Gastronomie & Divers</p>
            </a>
        </div>
    </div>

    <script src='main.js'></script>
</body>
</html>
